services:
  db:
    image: postgres:16-alpine
    container_name: toolshare-db
    environment:
      POSTGRES_USER: toolshare
      POSTGRES_PASSWORD: toolshare
      POSTGRES_DB: toolshare
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toolshare -d toolshare"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: toolshare-backend
    environment:
      DATABASE_URL: postgresql+psycopg://toolshare:toolshare@db:5432/toolshare
      SECRET_KEY: change-this-development-secret
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    container_name: toolshare-frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
